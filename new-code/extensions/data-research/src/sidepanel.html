<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AltLeads Data Research</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #f4f5f7;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ---- Top bar ---- */
      #topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #1a1a2e;
        color: #fff;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      #topbar .logo { font-weight: 700; font-size: 14px; flex: 1; letter-spacing: 0.02em; }
      #topbar .logo span { color: #e94560; }
      #auth-status { font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap; }
      #signout-btn {
        font-size: 11px; background: none; border: none;
        color: rgba(255,255,255,0.5); cursor: pointer; padding: 0 4px;
        text-decoration: underline;
      }
      #signout-btn:hover { color: #fff; }
      #refresh-btn {
        font-size: 12px; background: none; border: 1px solid rgba(255,255,255,0.3);
        color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 4px;
        padding: 2px 7px;
      }
      #refresh-btn:hover { background: rgba(255,255,255,0.1); }

      /* ---- Login section ---- */
      #login-section { padding: 16px 12px; }
      #login-section .msg-info { margin-bottom: 12px; }

      /* ---- Main section ---- */
      #main-section { display: flex; flex-direction: column; }

      /* ---- Profile banner (when on LinkedIn /in/ tab) ---- */
      #profile-banner {
        background: #eff6ff;
        border-bottom: 1px solid #bfdbfe;
        padding: 8px 12px;
        font-size: 12px;
      }
      #profile-banner.hidden { display: none; }
      .profile-banner-inner { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .banner-slug { color: #1d4ed8; font-size: 11px; word-break: break-all; flex: 1; }
      .banner-match { color: #16a34a; font-size: 11px; }
      .banner-no-match { color: #9ca3af; font-size: 11px; }
      .banner-req { color: #c2410c; font-size: 11px; }
      .btn-raise {
        font-size: 11px; background: #1d4ed8; color: #fff; border: none;
        border-radius: 4px; padding: 3px 8px; cursor: pointer; white-space: nowrap;
      }
      .btn-raise:hover { background: #1e40af; }

      /* ---- Queue & detail content areas ---- */
      #queue-view, #detail-view { padding: 12px; }

      /* ---- Raise form view ---- */
      #raise-view { padding: 12px; }
      #raise-view h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #1a1a2e; }

      /* ---- Section labels ---- */
      .section-label {
        font-size: 10px; font-weight: 700; color: #9ca3af;
        text-transform: uppercase; letter-spacing: 0.07em;
        margin: 12px 0 6px;
      }

      /* ---- Cards ---- */
      .detail-card {
        background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
        padding: 12px; margin-bottom: 10px;
      }
      .detail-header {
        font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px;
      }

      /* ---- Queue rows ---- */
      .queue-row {
        background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
        padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
        transition: border-color 0.15s;
      }
      .queue-row:hover { border-color: #93c5fd; }
      .req-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
      .req-id { font-size: 10px; color: #9ca3af; font-weight: 600; }
      .req-target { font-size: 12px; color: #1d4ed8; word-break: break-all; margin-bottom: 3px; }
      .req-meta { font-size: 11px; color: #9ca3af; }
      .req-notes { font-size: 11px; color: #4b5563; margin-top: 4px; }

      /* ---- Field rows ---- */
      .field-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; font-size: 12px; }
      .field-row .label { color: #9ca3af; width: 90px; flex-shrink: 0; font-size: 11px; }
      .field-row .value { color: #1a1a1a; word-break: break-all; }

      /* ---- Filled / missing badges ---- */
      .filled-badge {
        display: inline-block; padding: 1px 6px; border-radius: 9999px;
        font-size: 10px; font-weight: 600; background: #dcfce7; color: #16a34a;
        text-transform: uppercase; margin-right: 4px;
      }
      .missing-badge {
        display: inline-block; padding: 1px 6px; border-radius: 9999px;
        font-size: 10px; font-weight: 600; background: #fef3c7; color: #d97706;
        text-transform: uppercase;
      }

      /* ---- Badges ---- */
      .badge {
        display: inline-block; padding: 2px 7px; border-radius: 9999px;
        font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      }
      .badge-green  { background: #dcfce7; color: #16a34a; }
      .badge-orange { background: #ffedd5; color: #c2410c; }
      .badge-gray   { background: #f3f4f6; color: #6b7280; }
      .badge-red    { background: #fee2e2; color: #b91c1c; }
      .badge-blue   { background: #dbeafe; color: #1d4ed8; }

      /* ---- Forms ---- */
      .form-group { margin-bottom: 10px; }
      .form-group label {
        display: block; font-size: 11px; color: #374151; margin-bottom: 3px;
        font-weight: 600;
      }
      .form-group input, .form-group textarea {
        width: 100%; padding: 7px 10px; border: 1px solid #d0d5dd;
        border-radius: 6px; font-size: 13px; color: #1a1a1a; outline: none;
        background: #fff;
      }
      .fill-input { width: 100%; padding: 6px 9px; border: 1px solid #d0d5dd;
        border-radius: 6px; font-size: 12px; color: #1a1a1a; outline: none; }
      .fill-input:focus, .form-group input:focus, .form-group textarea:focus
        { border-color: #1a1a2e; }
      .form-group textarea { resize: vertical; min-height: 56px; }

      /* ---- Buttons ---- */
      .btn-primary {
        padding: 7px 14px; background: #1a1a2e; color: #fff;
        border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
        cursor: pointer;
      }
      .btn-primary:hover { background: #2d2d4e; }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
      .btn-secondary {
        padding: 7px 14px; background: #fff; color: #374151;
        border: 1px solid #d0d5dd; border-radius: 6px; font-size: 12px; font-weight: 500;
        cursor: pointer;
      }
      .btn-secondary:hover { background: #f9fafb; }
      .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }
      .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      .btn-back {
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 12px; color: #1d4ed8; background: none; border: none;
        cursor: pointer; padding: 0; margin-bottom: 12px; text-decoration: underline;
      }
      .btn-back:hover { color: #1e40af; }

      /* ---- Info banner ---- */
      .info-banner {
        padding: 10px 12px; background: #eff6ff; border: 1px solid #bfdbfe;
        border-radius: 8px; color: #1d4ed8; font-size: 12px; margin-bottom: 10px;
      }

      /* ---- Messages ---- */
      .msg-error {
        padding: 8px 10px; background: #fef2f2; border: 1px solid #fca5a5;
        border-radius: 6px; color: #b91c1c; font-size: 12px; margin-top: 8px;
      }
      .msg-info {
        padding: 8px 10px; background: #eff6ff; border: 1px solid #bfdbfe;
        border-radius: 6px; color: #1d4ed8; font-size: 12px;
      }

      /* ---- Spinner ---- */
      .spinner {
        width: 20px; height: 20px; border: 2px solid #e5e7eb;
        border-top-color: #1a1a2e; border-radius: 50%;
        animation: spin 0.8s linear infinite; margin: 0 auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ---- Utility ---- */
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <!-- ================================================================
         TOP BAR  (always visible)
    ================================================================ -->
    <div id="topbar">
      <div class="logo">AltLeads <span>Research</span></div>
      <span id="auth-status"></span>
      <button id="refresh-btn" class="hidden">Refresh</button>
      <button id="signout-btn" class="hidden">Sign out</button>
    </div>

    <!-- ================================================================
         LOGIN SECTION  (shown when not authenticated)
    ================================================================ -->
    <div id="login-section">
      <div class="msg-info">Sign in with your AltLeads CRM research account.</div>
      <br/>
      <div class="form-group">
        <label for="email-input">Email</label>
        <input type="email" id="email-input" placeholder="you@amplior.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password-input">Password</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button id="login-btn" class="btn-primary" style="width:100%;padding:9px;">Sign in</button>
      <div id="login-error" class="hidden msg-error"></div>
    </div>

    <!-- ================================================================
         MAIN SECTION  (shown when authenticated)
    ================================================================ -->
    <div id="main-section" class="hidden">

      <!-- LinkedIn profile banner (shown when active tab = LinkedIn /in/ URL) -->
      <div id="profile-banner" class="hidden"></div>

      <!-- QUEUE VIEW (default) -->
      <div id="queue-view">
        <div id="queue-content">
          <!-- Populated by loadQueue() -->
        </div>
      </div>

      <!-- DETAIL VIEW (per-request) -->
      <div id="detail-view" class="hidden">
        <button id="back-btn" class="btn-back">&#8592; Back to queue</button>
        <div id="detail-content">
          <!-- Populated by renderDetailView() -->
        </div>
      </div>

    </div>

    <!-- ================================================================
         RAISE REQUEST VIEW  (form to create a new research request)
    ================================================================ -->
    <div id="raise-view" class="hidden" style="padding:12px;">
      <button id="raise-cancel-btn" class="btn-back">&#8592; Cancel</button>
      <h2>Raise research request</h2>
      <div id="raise-form">
        <div class="form-group">
          <label for="raise-linkedin">LinkedIn URL (if known)</label>
          <input type="url" id="raise-linkedin" placeholder="https://www.linkedin.com/in/slug" />
        </div>
        <div class="form-group">
          <label for="raise-fields">Fields needed <span style="color:#b91c1c;">*</span></label>
          <input type="text" id="raise-fields" placeholder="e.g. email, mobile, designation" />
        </div>
        <div class="form-group">
          <label for="raise-notes">Notes (optional)</label>
          <textarea id="raise-notes" placeholder="Any context for the researcher…"></textarea>
        </div>
        <div class="btn-row">
          <button id="raise-submit-btn" class="btn-primary">Submit request</button>
          <button id="raise-cancel-btn2" class="btn-secondary">Cancel</button>
        </div>
        <div id="raise-msg" class="hidden"></div>
      </div>
    </div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
